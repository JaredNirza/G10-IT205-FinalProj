{% extends 'base.html' %}

{% block content %}
<div class="card shadow-sm mt-4" style="max-width: 600px; margin: auto;">
    <div class="card-header bg-white">
        <h2 class="mb-0">{{ employee.first_name }} {{ employee.last_name }}</h2>
    </div>
    <div class="card-body">
        <ul class="list-group list-group-flush mb-4">
            <li class="list-group-item"><strong>Email:</strong> <a href="mailto:{{ employee.email }}">{{ employee.email }}</a></li>
            <li class="list-group-item"><strong>Department:</strong> {{ employee.department }}</li>
            <li class="list-group-item"><strong>Desk Number:</strong> {{ employee.desk_number }}</li>
        </ul>
        <div class="d-flex justify-content-between">
            <a href="{% url 'employee-list' %}" class="btn btn-secondary">Back to Directory</a>
            <div>
                <a href="{% url 'employee-update' employee.pk %}" class="btn btn-primary">Edit</a>
                <a href="{% url 'employee-delete' employee.pk %}" class="btn btn-danger">Delete</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
