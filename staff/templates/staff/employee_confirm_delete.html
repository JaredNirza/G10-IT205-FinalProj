{% extends 'base.html' %}

{% block content %}
<div class="card shadow-sm border-danger mt-4" style="max-width: 500px; margin: auto;">
    <div class="card-header bg-danger text-white">
        <h3 class="mb-0">Confirm Deletion</h3>
    </div>
    <div class="card-body text-center">
        <p class="lead">Are you sure you want to remove <strong>{{ employee.first_name }} {{ employee.last_name }}</strong> from the directory?</p>
        <p class="text-muted">This action cannot be undone.</p>
        
        <form method="POST" class="mt-4">
            {% csrf_token %}
            <a href="{% url 'employee-list' %}" class="btn btn-secondary me-2">Cancel</a>
            <button type="submit" class="btn btn-danger">Yes, Remove</button>
        </form>
    </div>
</div>
{% endblock %}
