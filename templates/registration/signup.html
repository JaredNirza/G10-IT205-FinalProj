{% extends 'base.html' %}

{% block content %}
<div class="card shadow-sm mt-5" style="max-width: 400px; margin: auto;">
    <div class="card-header bg-primary text-white text-center">
        <h3 class="mb-0">Staff Registration</h3>
    </div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary w-100">Register</button>
        </form>
        <div class="text-center mt-3">
            <small class="text-muted">Already have an account? <a href="{% url 'login' %}">Log in here</a></small>
        </div>
    </div>
</div>
{% endblock %}
