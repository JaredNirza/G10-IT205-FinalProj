{% extends 'base.html' %}

{% block content %}
<div class="card shadow-sm mt-5" style="max-width: 400px; margin: auto;">
    <div class="card-header bg-dark text-white text-center">
        <h3 class="mb-0">SupplySync Login</h3>
    </div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-dark w-100">Login</button>
        </form>
        <div class="text-center mt-3">
            <small>New staff? <a href="{% url 'signup' %}">Register here</a></small>
        </div>
    </div>
</div>
{% endblock %}
