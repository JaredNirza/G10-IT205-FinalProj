{% extends 'base.html' %}

{% block content %}
<div class="card shadow-sm mt-4" style="max-width: 600px; margin: auto;">
    <div class="card-header bg-white">
        <h2 class="mb-0">{% if object %}Edit Item{% else %}Add New Item{% endif %}</h2>
    </div>
    <div class="card-body">
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="mt-4">
                <button type="submit" class="btn btn-success">Save Item</button>
                <a href="{% url 'item-list' %}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
